<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Digital Twin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="f1-loader">
        <div class="race-track">
            <div class="f1-car">
                <svg viewBox="0 0 120 40" class="f1-sprite">
                    <path d="M10 30 L110 30 L105 15 L30 15 Z" fill="var(--f1-red)" />
                    <rect x="0" y="28" width="15" height="4" fill="#333" />
                    <rect x="105" y="10" width="10" height="15" fill="#333" />
                    <circle cx="25" cy="32" r="7" fill="#111" stroke="#333" stroke-width="2" />
                    <circle cx="95" cy="32" r="7" fill="#111" stroke="#333" stroke-width="2" />
                    <path d="M50 15 Q60 5 70 15" fill="none" stroke="white" stroke-width="2" />
                </svg>
                <div class="smoke-container">
                    <span class="smoke-bubble"></span>
                    <span class="smoke-bubble"></span>
                    <span class="smoke-bubble"></span>
                </div>
            </div>
        </div>
        <div class="loading-text">PREPARING DIGITAL TWIN...</div>
    </div>

    <header class="main-header">
        <div class="logo">F1 <span>DIGITAL TWIN</span></div>
        <nav>
            <ul>
                <li><a href="/" class="nav-link" data-page="home">Home</a></li>
                <li><a href="/contact" class="nav-link" data-page="contact">Contact</a></li>
                <li><a href="/about-us" class="nav-link" data-page="about-us">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main id="content-area">
        <h1><i>YOUR ULTIMATE F1 DESTINATION</i></h1>
        <div class="feature-container">
            <div class="feature-card nav-link" id="leader-board" data-page="leader-board">Leader Board</div>
            <div class="feature-card nav-link" id="live-simulator" data-page="simulator">Live Simulator</div>
            <div class="feature-card nav-link" id="events" data-page="live-events">Events</div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
