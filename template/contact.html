<section class="contact-container fade-in">
    <div class="contact-header">
        <h1>TECHNICAL <span>SUPPORT</span></h1>
        <p>Report a bug in the simulator or request new track data.</p>
    </div>

    <form class="f1-form" id="contact-form">
        <div class="form-row">
            <div class="form-group">
                <label>Driver Name</label>
                <input type="text" placeholder="e.g. Max_Speed_99" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="paddock@f1twin.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Subject</label>
            <select>
                <option>Simulator Physics Bug</option>
                <option>Leaderboard Dispute</option>
                <option>General Inquiry</option>
            </select>
        </div>

        <div class="form-group">
            <label>Message / Telemetry Data</label>
            <textarea rows="5" placeholder="Describe the issue..."></textarea>
        </div>

        <button type="submit" class="btn-primary">Transmit Message</button>
    </form>
</section>
