<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 Velocity | Live Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">F1 <span>VELOCITY</span></div>
        <nav>
            <ul>
                <li><a href="index.html">Leaderboard</a></li>
                <li><a href="simulator.html">Simulator</a></li>
                <li><a href="live-events.html" class="active">Live Events</a></li>
            </ul>
        </nav>
    </header>

    <main class="events-container">
        <h1>Current World Races</h1>
        
        <div class="event-card live">
            <div class="event-info">
                <span class="badge red">LIVE</span>
                <h2>Monaco Grand Prix</h2>
                <p>Circuit de Monaco | Lap 45/78</p>
            </div>
            <div class="event-stats">
                <p>Track Temp: 28°C</p>
                <p>Humidity: 65%</p>
            </div>
        </div>

        <div class="event-card upcoming">
            <div class="event-info">
                <span class="badge blue">UPCOMING</span>
                <h2>British Grand Prix</h2>
                <p>Silverstone Circuit | Starts in 4 Days</p>
            </div>
        </div>
    </main>
</body>
</html>
